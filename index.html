<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>友间小站 · 群聊 · 音乐 · AI · 日记</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
  :root {
    --bg-color: #1a1a2e;
    --text-color: #eee;
    --primary: #ff9f4b;
    --secondary: #ffaa33;
  }
  body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .app-container { width: 100%; max-width: 480px; background: #16213e; border-radius: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.5); display: flex; flex-direction: column; height: 90vh; }
  /* 头部 */
  .header { padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; background: #0f3460; border-radius: 20px 20px 0 0; }
  .header h2 { margin: 0; font-size: 1.2rem; }
  .header i { font-size: 1.3rem; cursor: pointer; }

  /* 菜单按钮（左侧竖排） */
  .menu-icons { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 10px; z-index: 10; }
  .menu-icon { background: rgba(255,255,255,0.1); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; cursor: pointer; transition: 0.3s; }
  .menu-icon.active { background: rgba(255,159,75,0.5); color: #fff; }
  .menu-icon:hover { background: rgba(255,170,51,0.4); }
  /* 底部导航 */
  .bottom-nav { display: flex; justify-content: space-around; padding: 8px 0; background: #0f3460; border-radius: 0 0 20px 20px; }
  .nav-item { text-align: center; color: #ccc; font-size: 0.9rem; cursor: pointer; padding: 5px 10px; border-radius: 15px; }
  .nav-item i { display: block; font-size: 1.2rem; margin-bottom: 2px; }
  .nav-item.active { background: rgba(255,159,75,0.45); color: white; }

  /* 面板容器 */
  .panels { flex: 1; overflow-y: auto; padding: 10px; }
  .panel { display: none; }
  .panel.active { display: block; }

  /* 群聊样式 */
  #chatPanel { display: flex; flex-direction: column; height: 100%; }
  .messages { flex: 1; overflow-y: auto; margin-bottom: 10px; }
  .message { margin-bottom: 8px; padding: 8px 12px; background: #2c3e6b; border-radius: 15px; max-width: 80%; }
  .message.self { background: #ff9f4b; color: #000; margin-left: auto; }
  .input-area { display: flex; gap: 5px; }
  .input-area input { flex: 1; padding: 10px; border-radius: 20px; border: none; outline: none; }
  .input-area button { padding: 8px 15px; border-radius: 20px; border: none; background: var(--primary); color: white; cursor: pointer; }

  /* 其他面板通用 */
  .panel h2 { color: var(--primary); }
</style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <h2>友间小站</h2>
    <i class="fas fa-cog" id="settingsBtn"></i>
  </div>

  <!-- 左侧菜单（桌面版用，手机上可能隐藏，这里保留结构） -->
  <div class="menu-icons">
    <div class="menu-icon active" data-panel="chat" title="群聊"><i class="fas fa-users"></i></div>
    <div class="menu-icon" data-panel="music" title="音乐"><i class="fas fa-music"></i></div>
    <div class="menu-icon" data-panel="ai" title="AI助手"><i class="fas fa-robot"></i></div>
    <div class="menu-icon" data-panel="diary" title="日记"><i class="fas fa-book"></i></div>
  </div>

  <!-- 面板区 -->
  <div class="panels">
    <!-- 群聊面板 -->
    <div class="panel active" id="chatPanel">
      <div class="messages" id="messages"></div>
      <div class="input-area">
        <input type="text" id="chatInput" placeholder="输入消息..." />
        <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>
    <!-- 音乐面板 -->
    <div class="panel" id="musicPanel">
      <h2>🎵 音乐</h2>
      <p>点击歌曲播放（可跳转到<a href="music/index.html" style="color:#ff9f4b">独立播放器</a>）</p>
      <ul id="musicList"></ul>
    </div>
    <!-- AI面板 -->
    <div class="panel" id="aiPanel">
      <h2>🤖 AI助手</h2>
      <p>智能对话功能即将开放</p>
    </div>
    <!-- 日记面板 -->
    <div class="panel" id="diaryPanel">
      <h2>📖 日记</h2>
      <p>私人日记，登录后可写（<a href="login.html" style="color:#ff9f4b">去登录</a>）</p>
    </div>
  </div>

  <!-- 底部导航 -->
  <div class="bottom-nav">
    <div class="nav-item active" data-panel="chat"><i class="fas fa-users"></i>群聊</div>
    <div class="nav-item" data-panel="music"><i class="fas fa-music"></i>音乐</div>
    <div class="nav-item" data-panel="ai"><i class="fas fa-robot"></i>AI</div>
    <div class="nav-item" data-panel="diary"><i class="fas fa-book"></i>日记</div>
  </div>
</div>

<script>
// 面板切换功能
(function() {
  const allTriggers = document.querySelectorAll('.menu-icon, .nav-item');
  const panels = {
    chat: document.getElementById('chatPanel'),
    music: document.getElementById('musicPanel'),
    ai: document.getElementById('aiPanel'),
    diary: document.getElementById('diaryPanel')
  };

  function switchPanel(panelName) {
    // 隐藏所有面板
    Object.values(panels).forEach(p => p && (p.style.display = 'none'));
    // 显示目标面板
    if (panels[panelName]) panels[panelName].style.display = 'block';
    // 更新激活状态
    allTriggers.forEach(el => el.classList.remove('active'));
    document.querySelectorAll(`[data-panel="${panelName}"]`).forEach(el => el.classList.add('active'));
  }

  allTriggers.forEach(trigger => {
    trigger.addEventListener('click', function() {
      const panel = this.dataset.panel;
      if (panel) switchPanel(panel);
    });
  });

  // 默认显示群聊
  switchPanel('chat');
})();

// 群聊 WebSocket
const ws = new WebSocket('ws://' + window.location.hostname + ':3000');
const messagesDiv = document.getElementById('messages');
ws.onopen = () => {
  ws.send(JSON.stringify({ type: 'getHistory' }));
};
ws.onmessage = (e) => {
  const data = JSON.parse(e.data);
  if (data.type === 'history') {
    data.messages.forEach(msg => addMessage(msg.sender, msg.text, false));
  } else if (data.type === 'chat') {
    addMessage(data.sender, data.text, data.sender === getCurrentUser());
  }
};
function getCurrentUser() {
  return localStorage.getItem('currentUser') || '匿名';
}
function addMessage(sender, text, isSelf) {
  const div = document.createElement('div');
  div.className = 'message' + (isSelf ? ' self' : '');
  div.innerHTML = `<strong>${sender}:</strong> ${text}`;
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}
document.getElementById('sendBtn').addEventListener('click', send);
document.getElementById('chatInput').addEventListener('keypress', e => {
  if (e.key === 'Enter') send();
});
function send() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  ws.send(JSON.stringify({ type: 'chat', sender: getCurrentUser(), text }));
  input.value = '';
}

// 音乐面板：加载歌单
fetch('playlist.json')
  .then(res => res.json())
  .then(tracks => {
    const ul = document.getElementById('musicList');
    tracks.forEach(track => {
      const li = document.createElement('li');
      li.textContent = track.title;
      li.style.cursor = 'pointer';
      li.addEventListener('click', () => {
        // 简单弹出播放（或跳转到音乐页）
        window.open('music/index.html', '_blank');
      });
      ul.appendChild(li);
    });
  });
</script>
</body>
</html>

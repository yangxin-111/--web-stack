<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.5">
  <title>友间小站 · 群聊 · 音乐 · AI · 日记</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', 'PingFang SC', Roboto, sans-serif; background: #0b1a2f; height: 100vh; width: 100vw; overflow: hidden; position: relative; }
    .bg-image { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; z-index: 0; transition: 0.8s; }
    .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 1; }
    .main-container { position: relative; z-index: 2; width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center; padding-left: 80px; }
    .dashboard { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 20px; width: 90%; max-width: 1300px; height: 85%; }
    .card { background: rgba(20,35,55,0.7); backdrop-filter: blur(16px); border-radius: 32px; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 20px 40px rgba(0,0,0,0.5); display: flex; flex-direction: column; overflow: hidden; color: #f0f4fa; }
    .card-header { padding: 12px 18px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.15); font-weight: 600; font-size: 1.1rem; background: rgba(0,0,0,0.25); }
    .card-header i { font-size: 1.3rem; color: #ffcc80; }
    .card-body { flex: 1; padding: 10px; display: flex; flex-direction: column; overflow: hidden; }

    .group-chat-container { display: flex; flex: 1; overflow: hidden; }
    .group-member-list { width: 140px; background: rgba(0,0,0,0.2); border-radius: 16px; margin-right: 10px; padding: 8px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
    .member-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 12px; background: rgba(255,255,255,0.05); font-size: 0.85rem; }
    .member-avatar { width: 28px; height: 28px; border-radius: 50%; background: #ff9f4b; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #fff; font-size: 0.75rem; }
    .member-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .online-dot { width: 8px; height: 8px; background: #4caf50; border-radius: 50%; margin-left: auto; }
    .group-chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .group-chat-messages { flex: 1; overflow-y: auto; padding: 8px 4px; display: flex; flex-direction: column; gap: 10px; }
    .msg-row { display: flex; gap: 8px; align-items: flex-start; max-width: 85%; }
    .msg-row.self { align-self: flex-end; flex-direction: row-reverse; }
    .msg-avatar { width: 32px; height: 32px; border-radius: 50%; background: #3b5a7a; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.8rem; color: #fff; flex-shrink: 0; }
    .msg-row.self .msg-avatar { background: #ff9f4b; }
    .msg-content { background: rgba(255,255,255,0.12); padding: 8px 12px; border-radius: 16px; word-break: break-word; font-size: 0.9rem; backdrop-filter: blur(4px); }
    .msg-row.self .msg-content { background: rgba(255,159,75,0.3); }
    .msg-sender { font-size: 0.7rem; opacity: 0.7; margin-bottom: 2px; }
    .msg-time { font-size: 0.6rem; opacity: 0.5; margin-top: 2px; text-align: right; }
    .system-msg { text-align: center; font-size: 0.75rem; opacity: 0.6; margin: 5px 0; }

    .chat-input-area { display: flex; gap: 8px; margin-top: 6px; }
    .chat-input-area input { flex: 1; padding: 10px 14px; border-radius: 25px; border: none; background: rgba(255,255,255,0.15); backdrop-filter: blur(8px); color: #fff; outline: none; border: 1px solid rgba(255,255,255,0.25); }
    .chat-input-area button { background: #ff9f4b; border: none; border-radius: 50%; width: 40px; height: 40px; color: #fff; font-size: 1rem; cursor: pointer; }

    .player-box { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; height: 100%; }
    .album-art { font-size: 4.5rem; color: #ffcc80; filter: drop-shadow(0 8px 12px black); }
    .controls { display: flex; gap: 20px; }
    .controls i { font-size: 2rem; cursor: pointer; color: #e0e8ff; }

    .ai-response { background: rgba(0,0,0,0.3); border-radius: 18px; padding: 14px; min-height: 80px; margin-bottom: 10px; font-style: italic; color: #d4e6ff; position: relative; }
    .summon-ai-btn { position: absolute; top: 8px; right: 8px; background: linear-gradient(135deg,#ff6b6b,#ff8e53); border: none; border-radius: 25px; padding: 6px 14px; color: #fff; font-weight: bold; font-size: 0.8rem; cursor: pointer; z-index: 5; animation: pulse 2s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255,107,107,0.7); } 70% { box-shadow: 0 0 0 10px rgba(255,107,107,0); } 100% { box-shadow: 0 0 0 0; } }
    .ai-status { display: inline-block; width: 8px; height: 8px; background: #4caf50; border-radius: 50%; margin-left: 4px; animation: blink 1.5s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .diary-editor { display: flex; flex-direction: column; gap: 10px; height: 100%; }
    .diary-textarea { flex: 1; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.25); border-radius: 18px; padding: 12px; color: #fff; resize: none; font-size: 0.95rem; backdrop-filter: blur(4px); }
    .media-gallery { display: flex; gap: 8px; flex-wrap: wrap; }
    .media-thumb { width: 45px; height: 45px; background: rgba(255,255,255,0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; color: #ccc; }

    .side-menu { position: fixed; left: 16px; top: 50%; transform: translateY(-50%); z-index: 30; display: flex; flex-direction: column; gap: 18px; background: rgba(255,255,255,0.08); backdrop-filter: blur(10px); padding: 20px 10px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.15); }
    .menu-icon { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); border-radius: 50%; color: rgba(255,255,255,0.8); font-size: 1.5rem; cursor: pointer; position: relative; transition: 0.25s; }
    .menu-icon:hover { background: rgba(255,170,51,0.4); color: #fff; transform: translateX(5px); }
    .menu-icon.active { background: rgba(255,159,75,0.5); color: #fff; }
    .menu-icon::after { content: attr(data-tooltip); position: absolute; left: 60px; background: rgba(0,0,0,0.7); color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; white-space: nowrap; opacity: 0; pointer-events: none; transition: 0.2s; }
    .menu-icon:hover::after { opacity: 1; }

    .bg-settings-btn { position: fixed; top: 20px; right: 20px; z-index: 50; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); border-radius: 25px; padding: 8px 16px; color: #fff; cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; }
    .bg-panel { position: fixed; top: 70px; right: 20px; z-index: 50; background: rgba(20,30,50,0.9); backdrop-filter: blur(20px); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.2); display: none; width: 280px; color: #fff; }
    .bg-panel.show { display: block; }
    .preset-bg-list { display: flex; gap: 8px; flex-wrap: wrap; }
    .preset-bg-item { width: 55px; height: 55px; border-radius: 12px; background-size: cover; cursor: pointer; border: 2px solid transparent; }
    .preset-bg-item:hover { border-color: #ff9f4b; }

    .global-summon, .chat-shortcut-btn { position: fixed; bottom: 30px; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100; border: 2px solid rgba(255,255,255,0.3); color: #fff; font-size: 1.5rem; transition: 0.3s; }
    .global-summon { right: 100px; background: linear-gradient(135deg,#667eea,#764ba2); }
    .chat-shortcut-btn { right: 30px; background: linear-gradient(135deg,#43cea2,#185a9d); }

    .floating-chat { position: fixed; bottom: 100px; right: 30px; width: 380px; height: 500px; background: rgba(20,30,45,0.85); backdrop-filter: blur(20px); border-radius: 24px; border: 1px solid rgba(255,255,255,0.3); box-shadow: 0 20px 50px rgba(0,0,0,0.7); z-index: 200; display: none; flex-direction: column; overflow: hidden; color: #fff; }
    .floating-chat.active { display: flex; }
    .floating-chat-header { padding: 10px 14px; background: rgba(0,0,0,0.3); display: flex; justify-content: space-between; align-items: center; cursor: move; }
    .floating-chat-body { flex: 1; display: flex; flex-direction: column; padding: 8px; overflow: hidden; }
    @media (max-width:800px) { .dashboard { grid-template-columns: 1fr; } .group-member-list { display: none; } }
  </style>
</head>
<body>

<div class="bg-image" id="bgImage" style="background-image: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?ixlib=rb-4.0.3&auto=format&fit=crop&w=1950&q=80');"></div>
<div class="bg-overlay"></div>

<button class="bg-settings-btn" id="bgSettingsBtn"><i class="fas fa-palette"></i> 背景</button>
<div class="bg-panel" id="bgPanel">
  <h4 style="margin-bottom:10px;">🎨 自定义背景</h4>
  <div style="display:flex; gap:8px; margin-bottom:10px;">
    <input type="text" id="bgUrlInput" placeholder="图片URL" style="flex:1; padding:8px; border-radius:20px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.3); color:white;">
    <button id="applyBgBtn" style="background:#ff9f4b; border:none; border-radius:20px; padding:8px 14px; color:white;">应用</button>
  </div>
  <div class="preset-bg-list">
    <div class="preset-bg-item" style="background-image:url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=300')" data-url="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1950"></div>
    <div class="preset-bg-item" style="background-image:url('https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=300')" data-url="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=1950"></div>
    <div class="preset-bg-item" style="background-image:url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=300')" data-url="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=1950"></div>
  </div>
</div>

<div class="side-menu">
  <div class="menu-icon active" data-tooltip="群聊" id="menuChat"><i class="fas fa-users"></i></div>
  <div class="menu-icon" data-tooltip="音乐" id="menuMusic"><i class="fas fa-music"></i></div>
  <div class="menu-icon" data-tooltip="AI助手" id="menuAI"><i class="fas fa-robot"></i></div>
  <div class="menu-icon" data-tooltip="日记" id="menuDiary"><i class="fas fa-book"></i></div>
</div>

<div class="global-summon" id="globalSummonBtn"><i class="fas fa-magic"></i></div>
<div class="chat-shortcut-btn" id="chatShortcutBtn"><i class="fas fa-comment-dots"></i></div>

<div class="floating-chat" id="floatingChat">
  <div class="floating-chat-header" id="floatingChatHeader">
    <span><i class="fas fa-users"></i> 好友群聊</span>
    <div>
      <i class="fas fa-minus" id="minimizeChat" style="cursor:pointer; margin-right:8px;"></i>
      <i class="fas fa-times" id="closeChat" style="cursor:pointer;"></i>
    </div>
  </div>
  <div class="floating-chat-body">
    <div class="group-chat-messages" id="floatingGroupMessages"></div>
    <div class="chat-input-area">
      <input type="text" id="floatingChatInput" placeholder="输入消息...">
      <button id="floatingSendBtn"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>
</div>

<div class="main-container">
  <div class="dashboard">
    <div class="card" id="chatCard">
      <div class="card-header"><i class="fas fa-users"></i> 我们的群聊 <span style="font-size:0.7rem; opacity:0.7;">(4人在线)</span></div>
      <div class="card-body">
        <div class="group-chat-container">
          <div class="group-member-list" id="memberList">
            <div class="member-item"><div class="member-avatar">我</div><span class="member-name">我</span><div class="online-dot"></div></div>
            <div class="member-item"><div class="member-avatar" style="background:#5f7d9c;">明</div><span>小明</span><div class="online-dot"></div></div>
            <div class="member-item"><div class="member-avatar" style="background:#7b5ea7;">红</div><span>小红</span><div class="online-dot"></div></div>
            <div class="member-item"><div class="member-avatar" style="background:#3b8c6e;">壮</div><span>大壮</span><div class="online-dot"></div></div>
          </div>
          <div class="group-chat-area">
            <div class="group-chat-messages" id="groupChatMessages"></div>
            <div class="chat-input-area">
              <input type="text" id="groupChatInput" placeholder="输入群消息...">
              <button id="sendGroupBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card" id="musicCard">
      <div class="card-header"><i class="fas fa-headphones"></i> 此刻音乐</div>
      <div class="card-body">
        <div class="player-box">
          <div class="album-art"><i class="fas fa-compact-disc"></i></div>
          <div><span id="songTitle">晚风心里吹</span> - <span id="artistName">阿梨粤</span></div>
          <div class="controls">
            <i class="fas fa-backward" id="prevBtn"></i>
            <i class="fas fa-play-circle" id="playBtn" style="font-size:2.4rem;"></i>
            <i class="fas fa-forward" id="nextBtn"></i>
          </div>
        </div>
      </div>
    </div>

    <div class="card" id="aiCard">
      <div class="card-header"><i class="fas fa-brain"></i> 小友 AI <span class="ai-status" id="aiStatusIndicator"></span></div>
      <div class="card-body" style="position:relative;">
        <button class="summon-ai-btn" id="summonAiBtn"><i class="fas fa-bell"></i> 呼唤</button>
        <div class="ai-response" id="aiResponse">✨ 问我任何事，或者点击呼唤AI~</div>
        <div class="chat-input-area">
          <input type="text" id="aiInput" placeholder="和AI对话...">
          <button id="sendAiBtn"><i class="fas fa-arrow-right"></i></button>
        </div>
      </div>
    </div>

    <div class="card" id="diaryCard">
      <div class="card-header"><i class="fas fa-feather-alt"></i> 共享日记</div>
      <div class="card-body">
        <div class="diary-editor">
          <textarea class="diary-textarea" id="diaryText" placeholder="写点什么..."></textarea>
          <div class="media-gallery" id="mediaPreview">
            <div class="media-thumb"><i class="fas fa-image"></i></div>
            <div class="media-thumb"><i class="fas fa-video"></i></div>
          </div>
          <div style="display:flex; gap:6px;">
            <input type="text" id="mediaUrlInput" placeholder="媒体URL" style="flex:1; padding:8px; border-radius:20px; background:rgba(255,255,255,0.15); border:none; color:white;">
            <button id="addMediaBtn" style="background:#5f7d9c; border:none; border-radius:20px; padding:6px 14px; color:white;">添加</button>
            <button id="saveDiaryBtn" style="background:#ff9f4b; border:none; border-radius:20px; padding:6px 16px; color:white;">记录</button>
          </div>
          <div id="diaryEntries" style="margin-top:6px; max-height:60px; overflow-y:auto; font-size:0.8rem;"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
    const bgImage = document.getElementById('bgImage');
    document.getElementById('bgSettingsBtn').addEventListener('click', ()=> document.getElementById('bgPanel').classList.toggle('show'));
    function setBg(url) { bgImage.style.backgroundImage = `url('${url}')`; localStorage.setItem('bg',url); }
    document.getElementById('applyBgBtn').addEventListener('click', ()=>{
        const u = document.getElementById('bgUrlInput').value.trim();
        if(u) setBg(u);
    });
    document.querySelectorAll('.preset-bg-item').forEach(el=> el.addEventListener('click', ()=> setBg(el.dataset.url)));
    if(localStorage.getItem('bg')) setBg(localStorage.getItem('bg'));

    const members = {
        '我': { avatar: '我', color: '#ff9f4b' },
        '小明': { avatar: '明', color: '#5f7d9c' },
        '小红': { avatar: '红', color: '#7b5ea7' },
        '大壮': { avatar: '壮', color: '#3b8c6e' }
    };
    const myName = '我';

    const wsUrl = 'ws://47.114.124.77:3000';
    let ws;
    const groupContainer = document.getElementById('groupChatMessages');
    const floatingGroup = document.getElementById('floatingGroupMessages');
    const floatingChat = document.getElementById('floatingChat');

    function connectWebSocket() {
        ws = new WebSocket(wsUrl);
        ws.onopen = () => addSystemToBoth('✅ 已连接到群聊服务器');
        ws.onmessage = (event) => {
            try {
                const msg = JSON.parse(event.data);
                if (msg.type === 'chat') {
                    const isSelf = (msg.sender === myName);
                    addMessageToBoth(msg.sender, msg.text, isSelf, msg.time);
                } else if (msg.type === 'system') {
                    addSystemToBoth(msg.text);
                }
            } catch (e) {}
        };
        ws.onclose = () => { addSystemToBoth('❌ 连接断开，3秒后重连...'); setTimeout(connectWebSocket, 3000); };
    }

    function sendChatMessage(text) {
        if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'chat', sender: myName, text }));
        else addSystemToBoth('⚠️ 未连接服务器');
    }

    function addMessageToBoth(sender, text, isSelf, timeStr) {
        addGroupMessage(groupContainer, sender, text, isSelf, timeStr);
        if (floatingChat.classList.contains('active')) addGroupMessage(floatingGroup, sender, text, isSelf, timeStr);
    }
    function addSystemToBoth(text) {
        addSystemMsg(groupContainer, text);
        if (floatingChat.classList.contains('active')) addSystemMsg(floatingGroup, text);
    }

    function addGroupMessage(container, sender, text, isSelf = false, timeStr) {
        const now = new Date();
        const time = timeStr || `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        const row = document.createElement('div');
        row.className = 'msg-row' + (isSelf ? ' self' : '');
        const avatar = document.createElement('div');
        avatar.className = 'msg-avatar';
        avatar.style.background = members[sender]?.color || '#888';
        avatar.textContent = members[sender]?.avatar || sender[0];
        const content = document.createElement('div');
        content.className = 'msg-content';
        content.innerHTML = `<div class="msg-sender">${sender}</div>${text}<div class="msg-time">${time}</div>`;
        row.appendChild(avatar);
        row.appendChild(content);
        container.appendChild(row);
        container.scrollTop = container.scrollHeight;
    }

    function addSystemMsg(container, text) {
        const div = document.createElement('div');
        div.className = 'system-msg';
        div.textContent = text;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    connectWebSocket();

    document.getElementById('sendGroupBtn').addEventListener('click', ()=>{
        const input = document.getElementById('groupChatInput');
        const msg = input.value.trim();
        if(msg) { sendChatMessage(msg); input.value = ''; }
    });
    document.getElementById('groupChatInput').addEventListener('keypress', e=> { if(e.key==='Enter') document.getElementById('sendGroupBtn').click(); });

    document.getElementById('floatingSendBtn').addEventListener('click', ()=>{
        const input = document.getElementById('floatingChatInput');
        const msg = input.value.trim();
        if(msg) { sendChatMessage(msg); input.value = ''; }
    });
    document.getElementById('floatingChatInput').addEventListener('keypress', e=> { if(e.key==='Enter') document.getElementById('floatingSendBtn').click(); });

    document.getElementById('chatShortcutBtn').addEventListener('click', ()=> floatingChat.classList.toggle('active'));
    document.getElementById('minimizeChat').addEventListener('click', ()=> floatingChat.classList.remove('active'));
    document.getElementById('closeChat').addEventListener('click', ()=> floatingChat.classList.remove('active'));
    const header = document.getElementById('floatingChatHeader');
    let dragging = false, offX, offY;
    header.addEventListener('mousedown', e=> {
        dragging = true;
        offX = e.clientX - floatingChat.getBoundingClientRect().left;
        offY = e.clientY - floatingChat.getBoundingClientRect().top;
        floatingChat.style.transition = 'none';
    });
    document.addEventListener('mousemove', e=> {
        if(!dragging) return;
        floatingChat.style.left = (e.clientX - offX) + 'px';
        floatingChat.style.top = (e.clientY - offY) + 'px';
        floatingChat.style.right = 'auto';
        floatingChat.style.bottom = 'auto';
    });
    document.addEventListener('mouseup', ()=>{ dragging = false; floatingChat.style.transition = ''; });

    let isPlaying = false;
    const playlist = [{t:'晚风心里吹',a:'阿梨粤'},{t:'晴天',a:'周杰伦'},{t:'Stay',a:'The Kid LAROI'}];
    let trackIdx = 0;
    document.getElementById('playBtn').addEventListener('click', ()=>{
        isPlaying = !isPlaying;
        const btn = document.getElementById('playBtn');
        btn.className = isPlaying ? 'fas fa-pause-circle' : 'fas fa-play-circle';
    });
    document.getElementById('prevBtn').addEventListener('click', ()=>{
        trackIdx = (trackIdx-1+3)%3;
        document.getElementById('songTitle').textContent = playlist[trackIdx].t;
        document.getElementById('artistName').textContent = playlist[trackIdx].a;
    });
    document.getElementById('nextBtn').addEventListener('click', ()=>{
        trackIdx = (trackIdx+1)%3;
        document.getElementById('songTitle').textContent = playlist[trackIdx].t;
        document.getElementById('artistName').textContent = playlist[trackIdx].a;
    });

    const aiResp = document.getElementById('aiResponse');
    document.getElementById('sendAiBtn').addEventListener('click', ()=>{
        const t = document.getElementById('aiInput').value.trim();
        if(t) { aiResp.innerHTML = '✨ 好问题！'; document.getElementById('aiInput').value = ''; }
    });
    function summon() {
        document.getElementById('aiCard').classList.add('ai-wake-up');
        setTimeout(()=> document.getElementById('aiCard').classList.remove('ai-wake-up'),600);
        aiResp.innerHTML = '👋 我在！';
        document.getElementById('aiInput').focus();
    }
    document.getElementById('summonAiBtn').addEventListener('click', summon);
    document.getElementById('globalSummonBtn').addEventListener('click', summon);

    let tempMedia = [];
    function renderMedia() {
        const p = document.getElementById('mediaPreview');
        p.innerHTML = tempMedia.length ? '' : '<div class="media-thumb"><i class="fas fa-image"></i></div><div class="media-thumb"><i class="fas fa-video"></i></div>';
        tempMedia.forEach(u=> {
            const d = document.createElement('div'); d.className='media-thumb';
            d.innerHTML = `<i class="fas fa-${u.includes('video')?'video':'image'}"></i>`;
            p.appendChild(d);
        });
    }
    document.getElementById('addMediaBtn').addEventListener('click', ()=>{
        const u = document.getElementById('mediaUrlInput').value.trim();
        if(u) { tempMedia.push(u); document.getElementById('mediaUrlInput').value=''; renderMedia(); }
    });
    document.getElementById('saveDiaryBtn').addEventListener('click', ()=>{
        const txt = document.getElementById('diaryText').value.trim();
        if(!txt && !tempMedia.length) return;
        const entry = document.createElement('div');
        entry.style.background='rgba(255,255,255,0.08)'; entry.style.padding='4px 8px'; entry.style.borderRadius='10px';
        entry.innerHTML = `<i class="fas fa-pen"></i> ${txt||'(无文字)'}`;
        document.getElementById('diaryEntries').prepend(entry);
        document.getElementById('diaryText').value=''; tempMedia=[]; renderMedia();
    });
    renderMedia();

    document.querySelectorAll('.menu-icon').forEach(icon=> {
        icon.addEventListener('click', function(){
            document.querySelectorAll('.menu-icon').forEach(i=> i.classList.remove('active'));
            this.classList.add('active');
            const card = document.getElementById(this.id.replace('menu','')+'Card');
            if(card) card.scrollIntoView({behavior:'smooth'});
        });
    });
})();
</script>
</body>
</html>

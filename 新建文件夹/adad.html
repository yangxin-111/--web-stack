<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.5, viewport-fit=cover">
    <title>友间小站 · 群聊 · 音乐 · AI · 日记</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --safe-bottom: env(safe-area-inset-bottom, 10px);
            --nav-bottom-height: 75px;
            --mobile-top-offset: 60px;
            --mobile-bottom-offset: 100px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', Roboto, sans-serif;
            background: #0b1a2f;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }

        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            z-index: 0;
            transition: 0.8s;
            will-change: background-image;
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1;
            pointer-events: none;
        }

        .main-container {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-left: 80px;
            transition: padding 0.3s ease;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 20px;
            width: 90%;
            max-width: 1300px;
            height: 85%;
            transition: all 0.3s ease;
        }

        .card {
            background: rgba(20, 35, 55, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: #f0f4fa;
            transition: all 0.3s ease;
            min-height: 0;
        }

        .card-header {
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            font-weight: 600;
            font-size: 1.1rem;
            background: rgba(0, 0, 0, 0.25);
            flex-shrink: 0;
        }
        .card-header i {
            font-size: 1.3rem;
            color: #ffcc80;
        }
        .card-body {
            flex: 1;
            padding: 10px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }

        .group-chat-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            min-height: 0;
        }
        .group-member-list {
            width: 140px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            margin-right: 10px;
            padding: 8px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }
        .member-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            font-size: 0.85rem;
        }
        .member-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #ff9f4b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #fff;
            font-size: 0.75rem;
            flex-shrink: 0;
        }
        .member-name {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .online-dot {
            width: 8px;
            height: 8px;
            background: #4caf50;
            border-radius: 50%;
            margin-left: auto;
            flex-shrink: 0;
        }
        .group-chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }
        .group-chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 8px 4px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }
        .msg-row {
            display: flex;
            gap: 8px;
            align-items: flex-start;
            max-width: 85%;
        }
        .msg-row.self {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #3b5a7a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.8rem;
            color: #fff;
            flex-shrink: 0;
        }
        .msg-row.self .msg-avatar {
            background: #ff9f4b;
        }
        .msg-content {
            background: rgba(255, 255, 255, 0.12);
            padding: 8px 12px;
            border-radius: 16px;
            word-break: break-word;
            font-size: 0.9rem;
            backdrop-filter: blur(4px);
        }
        .msg-row.self .msg-content {
            background: rgba(255, 159, 75, 0.3);
        }
        .msg-sender {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-bottom: 2px;
        }
        .msg-time {
            font-size: 0.6rem;
            opacity: 0.5;
            margin-top: 2px;
            text-align: right;
        }
        .system-msg {
            text-align: center;
            font-size: 0.75rem;
            opacity: 0.6;
            margin: 5px 0;
            flex-shrink: 0;
        }

        .chat-input-area {
            display: flex;
            gap: 8px;
            margin-top: 6px;
            flex-shrink: 0;
        }
        .chat-input-area input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #fff;
            outline: none;
            font-size: 0.95rem;
            min-width: 0;
        }
        .chat-input-area input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        .chat-input-area button {
            background: #ff9f4b;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .chat-input-area button:active {
            transform: scale(0.92);
            background: #e88935;
        }

        .player-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            height: 100%;
        }
        .album-art {
            font-size: 4.5rem;
            color: #ffcc80;
            filter: drop-shadow(0 8px 12px black);
            transition: font-size 0.3s ease;
        }
        .controls {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .controls i {
            font-size: 2rem;
            cursor: pointer;
            color: #e0e8ff;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
            padding: 6px;
        }
        .controls i:active {
            transform: scale(0.85);
            color: #ffcc80;
        }

        .ai-response {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 18px;
            padding: 14px;
            min-height: 60px;
            margin-bottom: 10px;
            font-style: italic;
            color: #d4e6ff;
            position: relative;
            flex-shrink: 0;
            word-break: break-word;
        }
        .summon-ai-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            border: none;
            border-radius: 25px;
            padding: 6px 14px;
            color: #fff;
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
            z-index: 5;
            animation: pulse 2s infinite;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.2s;
        }
        .summon-ai-btn:active {
            transform: scale(0.93);
        }
        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.7);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(255, 107, 107, 0);
            }
            100% {
                box-shadow: 0 0 0 0;
            }
        }
        .ai-status {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #4caf50;
            border-radius: 50%;
            margin-left: 4px;
            animation: blink 1.5s infinite;
        }
        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }

        .diary-editor {
            display: flex;
            flex-direction: column;
            gap: 10px;
            height: 100%;
            min-height: 0;
        }
        .diary-textarea {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 18px;
            padding: 12px;
            color: #fff;
            resize: none;
            font-size: 0.95rem;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            min-height: 60px;
            -webkit-overflow-scrolling: touch;
        }
        .diary-textarea::placeholder {
            color: rgba(255, 255, 255, 0.45);
        }
        .media-gallery {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        .media-thumb {
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: #ccc;
            flex-shrink: 0;
        }

        /* 侧边菜单 - 桌面端 */
        .side-menu {
            position: fixed;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 30;
            display: flex;
            flex-direction: column;
            gap: 18px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 20px 10px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .menu-icon {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.5rem;
            cursor: pointer;
            position: relative;
            transition: 0.25s;
            -webkit-tap-highlight-color: transparent;
            flex-shrink: 0;
        }
        .menu-icon:hover {
            background: rgba(255, 170, 51, 0.4);
            color: #fff;
            transform: translateX(5px);
        }
        .menu-icon:active {
            transform: scale(0.9);
            background: rgba(255, 159, 75, 0.6);
        }
        .menu-icon.active {
            background: rgba(255, 159, 75, 0.5);
            color: #fff;
            box-shadow: 0 0 18px rgba(255, 159, 75, 0.35);
        }
        .menu-icon::after {
            content: attr(data-tooltip);
            position: absolute;
            left: 60px;
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: 0.2s;
            font-weight: 500;
        }
        .menu-icon:hover::after {
            opacity: 1;
        }

        .bg-settings-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 50;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            padding: 8px 16px;
            color: #fff;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .bg-settings-btn:active {
            background: rgba(255, 255, 255, 0.25);
        }
        .bg-panel {
            position: fixed;
            top: 70px;
            right: 20px;
            z-index: 50;
            background: rgba(20, 30, 50, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: none;
            width: 280px;
            color: #fff;
            transition: all 0.3s ease;
        }
        .bg-panel.show {
            display: block;
            animation: fadeInDown 0.3s ease;
        }
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .preset-bg-list {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .preset-bg-item {
            width: 55px;
            height: 55px;
            border-radius: 12px;
            background-size: cover;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .preset-bg-item:hover {
            border-color: #ff9f4b;
            transform: scale(1.08);
        }
        .preset-bg-item:active {
            transform: scale(0.94);
        }

        .global-summon,
        .chat-shortcut-btn {
            position: fixed;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            font-size: 1.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }
        .global-summon {
            right: 100px;
            bottom: 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }
        .chat-shortcut-btn {
            right: 30px;
            bottom: 30px;
            background: linear-gradient(135deg, #43cea2, #185a9d);
        }
        .global-summon:active,
        .chat-shortcut-btn:active {
            transform: scale(0.88);
        }
        .global-summon:hover,
        .chat-shortcut-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.55);
        }

        .floating-chat {
            position: fixed;
            bottom: 100px;
            right: 30px;
            width: 380px;
            height: 500px;
            background: rgba(20, 30, 45, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
            z-index: 200;
            display: none;
            flex-direction: column;
            overflow: hidden;
            color: #fff;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .floating-chat.active {
            display: flex;
            animation: popIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.85) translateY(30px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        .floating-chat-header {
            padding: 10px 14px;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
            flex-shrink: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        .floating-chat-header span {
            font-weight: 600;
            font-size: 0.95rem;
        }
        .floating-chat-header i {
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
            font-size: 1rem;
        }
        .floating-chat-header i:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        .floating-chat-header i:active {
            background: rgba(255, 255, 255, 0.25);
        }
        .floating-chat-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 8px;
            overflow: hidden;
            min-height: 0;
        }

        #songTitle,
        #artistName {
            transition: all 0.2s;
        }

        /* ==================== 平板端 (768px - 1024px) ==================== */
        @media (max-width: 1024px) and (min-width: 769px) {
            .main-container {
                padding-left: 70px;
            }
            .dashboard {
                gap: 16px;
                width: 93%;
                height: 82%;
            }
            .side-menu {
                left: 10px;
                padding: 16px 8px;
                gap: 14px;
                border-radius: 34px;
            }
            .menu-icon {
                width: 42px;
                height: 42px;
                font-size: 1.3rem;
            }
            .menu-icon::after {
                left: 52px;
                font-size: 0.7rem;
                padding: 3px 10px;
            }
            .group-member-list {
                width: 110px;
                padding: 6px;
                gap: 4px;
            }
            .member-item {
                font-size: 0.75rem;
                padding: 4px 6px;
            }
            .member-avatar {
                width: 24px;
                height: 24px;
                font-size: 0.65rem;
            }
            .card {
                border-radius: 24px;
            }
            .card-header {
                font-size: 1rem;
                padding: 10px 14px;
            }
            .floating-chat {
                width: 340px;
                height: 440px;
                bottom: 80px;
                right: 20px;
            }
            .global-summon {
                right: 80px;
                bottom: 20px;
                width: 48px;
                height: 48px;
                font-size: 1.3rem;
            }
            .chat-shortcut-btn {
                right: 20px;
                bottom: 20px;
                width: 48px;
                height: 48px;
                font-size: 1.3rem;
            }
        }

        /* ==================== 手机端 (< 768px) ==================== */
        @media (max-width: 768px) {
            body {
                overflow-y: auto;
                overflow-x: hidden;
                height: auto;
                min-height: 100vh;
                -webkit-overflow-scrolling: touch;
            }
            body.chat-open {
                overflow: hidden;
                position: fixed;
                width: 100%;
            }

            .main-container {
                height: auto;
                min-height: 100vh;
                padding: 70px 10px calc(var(--nav-bottom-height) + var(--safe-bottom) + 20px) 10px;
                align-items: flex-start;
                padding-left: 10px;
            }

            .dashboard {
                display: flex;
                flex-direction: column;
                gap: 16px;
                width: 100%;
                max-width: 100%;
                height: auto;
                padding-bottom: 20px;
            }

            .card {
                border-radius: 22px;
                min-height: 340px;
                flex-shrink: 0;
            }
            .card#musicCard {
                min-height: 200px;
            }
            .card#aiCard {
                min-height: 260px;
            }
            .card#diaryCard {
                min-height: 300px;
            }
            .card#chatCard {
                min-height: 420px;
            }

            .card-header {
                font-size: 1rem;
                padding: 10px 14px;
                gap: 8px;
            }
            .card-header i {
                font-size: 1.1rem;
            }
            .card-body {
                padding: 8px;
            }

            .group-member-list {
                display: none;
            }
            .group-chat-container {
                flex-direction: column;
            }
            .group-chat-area {
                width: 100%;
            }
            .group-chat-messages {
                gap: 8px;
                padding: 6px 2px;
            }
            .msg-row {
                max-width: 90%;
            }
            .msg-content {
                font-size: 0.85rem;
                padding: 7px 10px;
            }
            .msg-avatar {
                width: 28px;
                height: 28px;
                font-size: 0.7rem;
            }

            .chat-input-area input {
                font-size: 16px;
                padding: 10px 14px;
            }
            .chat-input-area button {
                width: 42px;
                height: 42px;
                font-size: 1.05rem;
            }

            .album-art {
                font-size: 3.5rem;
            }
            .controls i {
                font-size: 1.7rem;
                padding: 8px;
            }
            .player-box {
                gap: 12px;
            }
            .player-box>div:nth-child(2) {
                font-size: 0.9rem;
                text-align: center;
            }

            .ai-response {
                min-height: 50px;
                padding: 12px;
                font-size: 0.9rem;
                border-radius: 14px;
            }
            .summon-ai-btn {
                top: 6px;
                right: 6px;
                padding: 5px 12px;
                font-size: 0.75rem;
                border-radius: 22px;
            }

            .diary-textarea {
                font-size: 16px;
                min-height: 70px;
                border-radius: 14px;
            }
            .diary-editor {
                gap: 8px;
            }
            .media-thumb {
                width: 38px;
                height: 38px;
                font-size: 1.1rem;
                border-radius: 10px;
            }
            #diaryEntries {
                max-height: 50px;
                font-size: 0.75rem;
            }

            /* 底部导航栏 */
            .side-menu {
                position: fixed;
                left: 50%;
                top: auto;
                bottom: calc(8px + var(--safe-bottom));
                transform: translateX(-50%);
                flex-direction: row;

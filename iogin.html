<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
  <title>友间小站 · 登录</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', 'PingFang SC', system-ui, -apple-system, sans-serif;
      background: #0a1120;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .bg-layer {
      position: fixed; inset: 0; z-index: 0;
      background-image: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1950&q=80');
      background-size: cover; background-position: center;
      filter: brightness(0.5) saturate(1.2);
    }
    .bg-overlay {
      position: fixed; inset: 0; z-index: 1;
      background: radial-gradient(circle at 30% 30%, rgba(20,40,70,0.7) 0%, rgba(5,12,24,0.9) 90%);
      pointer-events: none;
    }
    .login-container {
      position: relative; z-index: 2;
      width: 90%; max-width: 420px;
      background: rgba(20, 35, 55, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 34px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
      padding: 40px 28px;
      text-align: center;
      color: #fff;
    }
    .login-container h1 {
      font-size: 2rem;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      font-weight: 700;
    }
    .login-container h1 i { color: #ffb347; }
    .subtitle {
      font-size: 0.9rem;
      opacity: 0.7;
      margin-bottom: 30px;
    }
    .input-group {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 30px;
      padding: 0 18px;
      margin-bottom: 20px;
    }
    .input-group i {
      color: rgba(255,255,255,0.5);
      font-size: 1.2rem;
      margin-right: 10px;
    }
    .input-group input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 16px 0;
      color: #fff;
      font-size: 1.1rem;
      outline: none;
    }
    .input-group input::placeholder {
      color: rgba(255,255,255,0.4);
    }
    .login-btn {
      width: 100%;
      background: linear-gradient(135deg, #ff9f4b, #ff6b4b);
      border: none;
      border-radius: 30px;
      padding: 15px;
      color: #fff;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .login-btn:active {
      transform: scale(0.96);
      opacity: 0.9;
    }
    .hint {
      font-size: 0.75rem;
      opacity: 0.5;
      margin-top: 16px;
    }
  </style>
</head>
<body>
<div class="bg-layer"></div>
<div class="bg-overlay"></div>

<div class="login-container">
  <h1><i class="fas fa-comments"></i> 友间小站</h1>
  <div class="subtitle">输入昵称，立即与朋友聊天</div>
  <div class="input-group">
    <i class="fas fa-user"></i>
    <input type="text" id="nicknameInput" placeholder="你的昵称..." maxlength="12" autofocus>
  </div>
  <button class="login-btn" id="enterBtn"><i class="fas fa-door-open"></i> 进入小站</button>
  <div class="hint">群聊 · 音乐 · AI · 日记</div>
</div>

<script>
  const nicknameInput = document.getElementById('nicknameInput');
  const enterBtn = document.getElementById('enterBtn');

  // 检查是否已有昵称，有则直接跳转
  if (localStorage.getItem('username')) {
    window.location.href = 'index.html';
  }

  function enterSite() {
    const name = nicknameInput.value.trim();
    if (!name) {
      alert('请输入昵称～');
      return;
    }
    if (name.length > 12) {
      alert('昵称最多12个字符');
      return;
    }
    localStorage.setItem('username', name);
    // 随机分配一个头像颜色
    const colors = ['#ff9f4b', '#5f7d9c', '#7b5ea7', '#3b8c6e', '#e0567a', '#4ecdc4', '#f7b731', '#6c5ce7'];
    const randomColor = colors[Math.floor(Math.random() * colors.length)];
    localStorage.setItem('myColor', randomColor);
    window.location.href = 'index.html';
  }

  enterBtn.addEventListener('click', enterSite);
  nicknameInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') enterSite();
  });
</script>
</body>
</html>

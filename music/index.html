<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音乐 - 友间小站</title>
<style>
  body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background: #f9f9f9; }
  a.back { display: inline-block; margin: 10px; color: #4CAF50; text-decoration: none; }
  ul { list-style: none; padding: 0; }
  li { padding: 10px; border-bottom: 1px solid #ddd; cursor: pointer; }
  li:hover { background: #eee; }
  audio { width: 100%; margin-top: 10px; }
</style>
</head>
<body>
  <h1>🎵 音乐</h1>
  <p>当前播放：<span id="nowPlaying">-</span></p>
  <audio id="player" controls></audio>
  <ul id="playlist"></ul>
  <a class="back" href="../index.html">← 返回群聊</a>

  <script>
    fetch('../playlist.json')
      .then(res => res.json())
      .then(tracks => {
        const ul = document.getElementById('playlist');
        const player = document.getElementById('player');
        const now = document.getElementById('nowPlaying');
        tracks.forEach((track, i) => {
          const li = document.createElement('li');
          li.textContent = track.title;
          li.addEventListener('click', () => {
            player.src = track.url;
            player.play();
            now.textContent = track.title;
          });
          ul.appendChild(li);
        });
        if (tracks.length > 0) {
          player.src = tracks[0].url;
          now.textContent = tracks[0].title;
        }
      });
  </script>
</body>
</html>
